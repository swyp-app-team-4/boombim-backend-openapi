name: boombim-scheduling CI/CD

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: boombim-scheduling
      CODEDEPLOY_APP_NAME: boombim-scheduling
      CODEDEPLOY_DEPLOYMENT_GROUP: boombim-scheduling

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip tests)
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::098072157131:role/boombim-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "[docker] build image..."
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .

          echo "[docker] tag latest..."
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest

          echo "[docker] push image..."
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Create CodeDeploy deployment
        run: |
          echo "[codedeploy] create deployment..."
          aws deploy create-deployment \
            --application-name "${{ env.CODEDEPLOY_APP_NAME }}" \
            --deployment-group-name "${{ env.CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --github-location repository=$GITHUB_REPOSITORY,commitId=$GITHUB_SHA
