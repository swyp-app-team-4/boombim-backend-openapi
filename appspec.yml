version: 0.0
os: linux

files:
  - source: scripts/
    destination: /home/ec2-user/boombim-scheduling/scripts

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      runas: ec2-user
      timeout: 60

  ApplicationStart:
    - location: scripts/deploy.sh
      runas: ec2-user
      timeout: 300
